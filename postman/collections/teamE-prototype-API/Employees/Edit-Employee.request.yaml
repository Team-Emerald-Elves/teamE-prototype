$kind: http-request
name: Edit Employee
method: POST
url: '{{baseUrl}}/edit-employee'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "id": "{{employeeId}}",
      "uname": "johndoe_updated",
      "firstName": "John",
      "lastName": "Doe",
      "roles": ["admin"],
      "email": "john.doe@example.com"
    }
