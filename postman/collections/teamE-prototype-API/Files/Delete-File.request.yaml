$kind: http-request
name: Delete File
method: DELETE
url: '{{baseUrl}}/api/supabase/delete-file'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{authToken}}'
body:
  type: json
  content: |-
    {
      "fileName": "example.txt"
    }
