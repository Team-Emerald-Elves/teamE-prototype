$kind: http-request
name: Create File
method: GET
url: '{{baseUrl}}/api/supabase/create-file'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{authToken}}'
body:
  type: json
  content: |-
    {
      "fileName": "example.txt",
      "fileContent": {
        "name": "example.txt",
        "content_owner": "{{employeeId}}",
        "mime_type": "text/plain",
        "expiration_date": "2026-12-31"
      }
    }
